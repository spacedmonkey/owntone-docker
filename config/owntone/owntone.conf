# OwnTone configuration file

general {
	uid = "owntone"
	db_path = "/var/cache/owntone/database.db"
	logfile = "/dev/stderr"
	loglevel = log
	trusted_networks = { "any" }
}

library {
	name = "OwnTone"
	port = 3689
	directories = { "/srv/media", "/srv/spotify-pipe" }
	pipe_autostart = true
}

audio {
	type = "disabled"
}
